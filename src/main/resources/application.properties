rag.loader.chunk-size=500
rag.loader.chunk-overlap=50
rag.loader.min-chunk-size=20

server.port=8080
management.endpoints.web.exposure.include=health,info

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Embedding engine
# provider: "mock" (no API key needed) | "api" (OpenAI-compatible REST endpoint)
rag.embedding.provider=mock
rag.embedding.model=text-embedding-3-small
rag.embedding.api-url=https://api.openai.com/v1/embeddings
rag.embedding.api-key=${EMBEDDING_API_KEY:}
rag.embedding.dimensions=1536
# Leave both prefixes empty for symmetric models (OpenAI, Cohere)
# For BGE-large set query-prefix="Represent this sentence for searching relevant passages: "
# For E5-large  set query-prefix="query: " and document-prefix="passage: "
rag.embedding.query-prefix=
rag.embedding.document-prefix=
