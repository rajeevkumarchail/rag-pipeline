rag.loader.chunk-size=500
rag.loader.chunk-overlap=50
rag.loader.min-chunk-size=20

server.port=8080
management.endpoints.web.exposure.include=health,info

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Embedding engine
# provider: "mock" (no API key needed) | "api" (OpenAI-compatible REST endpoint)
rag.embedding.provider=api
rag.embedding.model=nomic-embed-text
rag.embedding.api-url=http://localhost:11434/v1/embeddings
# Ollama ignores the Authorization header; any non-empty string avoids a missing-header 401
rag.embedding.api-key=ollama
rag.embedding.dimensions=768
# nomic-embed-text-v1.5 uses asymmetric prefixes for better retrieval quality
rag.embedding.query-prefix=search_query:
rag.embedding.document-prefix=search_document:
